# configs/real.yaml
project:
  out_dir: "results"
  experiment_name: "real"
  device: "cuda"
  force_retrain: false
  cache_models: true

repro:
  base_seed: 0
  n_runs: 10
  deterministic: true

data:
  dataset_names: ["bike", "bio", "blog", "facebook_1", "facebook_2", "homes", "superconductivity"]
  base_path: "datasets"

splits:
  train: 0.5
  val: 0.1
  cal: 0.2
  test: 0.2
  shuffle: true

conformal:
  alpha: 0.1

training:
  batch_size: 512
  max_epochs: 1000
  patience: 100
  grad_clip: 0.0

  cocp:
    variant: "fast"
    num_hidden: 64
    num_layers: 2
    dropout: 0.0
    weight_decay: 1.0e-5

    lr_mu_max: 1.0e-3
    lr_mu_min: 2.0e-4
    lr_h_max: 1.0e-3
    lr_h_min: 2.0e-4

    beta_start: 0.005
    beta_end: 0.005

    batch_size: 512
    max_epochs: 1000
    patience: 100
    n_folds: 4
    n_alt_iters: 5
    use_cp: true

    warmup_mu_max_epochs: 1000
    warmup_mu_patience: 100
    warmup_mu_min_delta: 1e-6

    refine_mu_max_epochs: 1000
    refine_mu_patience: 100
    refine_mu_min_delta: 1e-6

    h_max_epochs: 1000
    h_patience: 100
    h_min_delta: 1e-6

    n_fold_workers: 4
    fold_parallel_backend: "process"
    fold_num_threads: 1

eval:
  n_mc: 1000
  save_predictions: false
  save_models: true

plots:
  enabled: true
  n_show: 2500